<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emby Duplicate Finder</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <svg width="80" height="80" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="logo">
                <!-- Magnifying glass handle -->
                <rect x="68" y="72" width="10" height="25" rx="5" ry="5" transform="rotate(45 73 84.5)" fill="#4fc3f7"/>
                <!-- Magnifying glass circle -->
                <circle cx="45" cy="45" r="35" stroke="#4fc3f7" stroke-width="8" fill="none"/>
                <!-- Duplicate film strips inside -->
                <path d="M15,20 H45 V50 H15 Z M 20 25 h 20 M 20 35 h 20 M 20 45 h 20" stroke="#ffffff" stroke-width="2" fill="none" transform="translate(5, 5) rotate(10 30 35)" opacity="0.7"/>
                <path d="M15,20 H45 V50 H15 Z M 20 25 h 20 M 20 35 h 20 M 20 45 h 20" stroke="#ffffff" stroke-width="3" fill="none" transform="translate(0, 0) rotate(-5 30 35)"/>
            </svg>
        </div>
        <h1>Emby Duplicate Finder</h1>
        <div class="input-group">
            <div class="input-field">
                <label for="embyServerUrl">Emby Server URL</label>
                <input type="text" id="embyServerUrl" placeholder="e.g., www.domain.com, IP:8096, or localhost:8096">
            </div>
            <div class="input-field">
                <label for="apiKey">API Key</label>
                <input type="password" id="apiKey" placeholder="Enter your Emby API Key">
            </div>
            <div class="button-group">
                <button id="find-duplicates-btn">Find Duplicate Movies</button>
                <button id="open-emby-btn">Open Emby</button>
                <button id="refresh-library-btn">Refresh Library</button>
            </div>
        </div>
        <div id="results"></div>
    </div>
    <footer class="copyright">
        <p>&copy; 2026 Gilles Reichert. Inspired by <a href="https://github.com/imahmud1/emby-dupe-finder" target="_blank" rel="noopener noreferrer">imahmud1's Emby Duplicate Finder</a></p>
    </footer>
    <script src="script.js"></script>
    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <p>Processing...</p>
    </div>
</body>
</html>
